name: Deploy AI Gateway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check app/

      - name: Run tests
        run: poetry run pytest --cov=app --cov-report=term-missing -q

      - name: Deploy to service directory
        run: |
          cd /home/administrador/ai-gateway
          git pull origin main

      - name: Restart service
        run: sudo -n systemctl restart ai-gateway
